<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="오늘 내가 한 선택들, 후회할까? 🌙" />
  <meta property="og:description" content="14개 질문으로 오늘 하루의 선택들을 후회 판정해드립니다" />
  <meta property="og:image" content="https://sauuri.github.io/regret-or-not/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://sauuri.github.io/regret-or-not/" />

  <title>오늘 내가 한 선택들, 후회할까? 🌙</title>
  <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #07050f;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #ede8ff;
      overflow-x: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 70% 15%, #7c3aed22 0%, transparent 55%),
        radial-gradient(ellipse at 20% 85%, #4f46e518 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, #3b1a6e20 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* 별 파티클 */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s); opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50%       { opacity: var(--o, 0.5); transform: scale(1); }
    }

    /* 컨페티 */
    .confetti-piece {
      position: fixed; top: -12px;
      width: 8px; height: 8px; border-radius: 2px;
      pointer-events: none; z-index: 999;
      animation: confettiFall var(--cd, 1.5s) ease-in var(--cdelay, 0s) forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .container { position: relative; z-index: 1; width: 100%; max-width: 460px; padding: 20px 16px 40px; }

    /* ── INTRO ── */
    .intro-card {
      background: linear-gradient(145deg, #120d20, #0d0918);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 28px; overflow: hidden;
      box-shadow: 0 16px 60px rgba(124,58,237,0.18), 0 4px 16px rgba(0,0,0,0.4);
    }
    .intro-card-top {
      padding: 40px 28px 32px; text-align: center; position: relative;
    }
    .intro-card-top::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.2) 0%, transparent 70%);
    }
    .intro { text-align: center; position: relative; z-index: 1; }
    .intro-icon-wrap { display: inline-block; margin-bottom: 28px; }
    .intro-icon { font-size: 90px; display: block; animation: bob 3s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-8px) scale(1.05); }
    }

    .intro h1 {
      font-size: 30px; font-weight: 900; margin-bottom: 10px; line-height: 1.2;
      background: linear-gradient(135deg, #c4b5fd 20%, #a78bfa 60%, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .intro-desc { font-size: 15px; color: #6b5a8a; line-height: 1.9; margin-bottom: 36px; }
    .intro-desc strong { color: #a78bfa; }

    .intro-tags { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
    .intro-tag {
      background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.25);
      color: #a78bfa; font-size: 12px; font-weight: 700;
      padding: 5px 14px; border-radius: 20px;
    }

    .start-btn {
      background: linear-gradient(135deg, #5b21b6, #7c3aed, #a78bfa);
      color: white; border: none;
      padding: 16px 52px; border-radius: 50px;
      font-size: 17px; font-weight: 800; cursor: pointer;
      transition: all 0.3s; font-family: inherit;
      box-shadow: 0 6px 28px rgba(124,58,237,0.45);
      letter-spacing: 0.5px;
    }
    .start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(124,58,237,0.6); }
    .start-btn:active { transform: translateY(0); }

    /* ── PROGRESS ── */
    .progress-wrap { margin-bottom: 20px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      color: #5a4870; font-size: 13px; font-weight: 700;
      font-family: inherit; padding: 0; margin-bottom: 14px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: #a78bfa; }
    .back-btn:disabled { opacity: 0.25; cursor: default; }
    .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-label { font-size: 12px; color: #5a4870; font-weight: 700; letter-spacing: 0.5px; }
    .progress-count { font-size: 13px; color: #7c3aed; font-weight: 800; }
    .progress-bar {
      width: 100%; height: 7px;
      background: rgba(124,58,237,0.12); border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #5b21b6, #7c3aed, #a78bfa);
      border-radius: 4px; transition: width 0.45s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 8px rgba(124,58,237,0.5);
    }

    /* ── QUESTION CARD ── */
    .card {
      background: linear-gradient(145deg, #120d20, #0d0918);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 26px; padding: 30px 24px;
      box-shadow: 0 8px 40px rgba(124,58,237,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .question-card { animation: slideIn 0.38s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(28px) scale(0.97); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }

    .q-emoji { font-size: 42px; display: block; margin-bottom: 16px; }
    .q-num {
      display: inline-block; font-size: 11px; font-weight: 800;
      color: #7c3aed; letter-spacing: 1.5px; text-transform: uppercase;
      background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.2);
      padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
    }
    .q-text { font-size: 19px; font-weight: 700; line-height: 1.55; margin-bottom: 24px; color: #ede8ff; }

    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(124,58,237,0.15);
      border-radius: 16px; padding: 14px 16px;
      text-align: left; cursor: pointer;
      transition: all 0.22s;
      display: flex; align-items: center; gap: 12px;
      font-size: 15px; color: #9980c0; font-family: inherit;
      position: relative; overflow: hidden;
    }
    .option-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(124,58,237,0.08), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .option-btn:hover { border-color: rgba(124,58,237,0.5); color: #ede8ff; transform: translateX(5px); }
    .option-btn:hover::before { opacity: 1; }
    .option-btn.selected {
      background: linear-gradient(135deg, rgba(91,33,182,0.25), rgba(124,58,237,0.15));
      border-color: #7c3aed; color: white;
      box-shadow: 0 4px 20px rgba(124,58,237,0.25);
    }
    .option-icon { font-size: 22px; flex-shrink: 0; }

    /* ── RESULT ── */
    .result-outer { animation: resultReveal 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes resultReveal {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .result-card {
      background: linear-gradient(145deg, #120d20, #0d0918);
      border-radius: 28px; overflow: hidden;
      box-shadow: 0 16px 60px rgba(124,58,237,0.18), 0 4px 16px rgba(0,0,0,0.4);
    }

    .result-hero {
      padding: 36px 28px 28px; text-align: center; position: relative;
    }
    .result-hero::before {
      content: ''; position: absolute; inset: 0;
      background: var(--hero-bg, radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.2) 0%, transparent 70%));
    }
    .result-emoji {
      font-size: 80px; display: block; margin-bottom: 16px;
      position: relative; z-index: 1;
      animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-15deg); }
      to   { transform: scale(1) rotate(0deg); }
    }
    .result-badge {
      display: inline-block; padding: 6px 18px; border-radius: 50px;
      font-size: 12px; font-weight: 800; letter-spacing: 1px;
      margin-bottom: 14px; position: relative; z-index: 1;
      background: var(--badge-bg); color: var(--badge-color); border: 1px solid var(--badge-border);
    }
    .result-title {
      font-size: 24px; font-weight: 900; line-height: 1.35;
      margin-bottom: 8px; position: relative; z-index: 1;
      color: var(--title-color);
    }
    .result-sub { font-size: 14px; color: #6b5a8a; line-height: 1.85; position: relative; z-index: 1; }

    .advice-section { padding: 22px 28px; }
    .advice-box {
      background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.15);
      border-radius: 18px; padding: 18px 20px; margin-bottom: 20px;
    }
    .advice-tag { font-size: 10px; font-weight: 800; color: #7c3aed; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .advice-text { font-size: 14px; color: #9980c0; line-height: 1.85; }

    .ad-wrap { text-align: center; margin-bottom: 20px; }

    .action-btns { display: flex; flex-direction: column; gap: 10px; }
    .primary-btn {
      background: linear-gradient(135deg, #5b21b6, #7c3aed);
      color: white; border: none; padding: 15px; border-radius: 16px;
      font-size: 16px; font-weight: 800; cursor: pointer;
      transition: all 0.22s; font-family: inherit;
      box-shadow: 0 6px 24px rgba(124,58,237,0.35); letter-spacing: 0.3px;
    }
    .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(124,58,237,0.5); }
    .secondary-btn {
      background: rgba(124,58,237,0.08); color: #a78bfa;
      border: 1.5px solid rgba(124,58,237,0.25); padding: 15px; border-radius: 16px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.22s; font-family: inherit;
    }
    .secondary-btn:hover { background: rgba(124,58,237,0.14); border-color: rgba(124,58,237,0.45); }

    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #120d20; border: 1px solid rgba(124,58,237,0.4);
      color: #a78bfa; padding: 12px 26px; border-radius: 50px;
      font-size: 14px; font-weight: 700; z-index: 999;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(124,58,237,0.2);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* 등급별 */
    .g-perfect { --title-color:#34d399; --badge-bg:rgba(52,211,153,0.12); --badge-color:#34d399; --badge-border:rgba(52,211,153,0.3); --hero-bg:radial-gradient(ellipse at 50% 0%,rgba(52,211,153,0.18) 0%,transparent 70%); }
    .g-hmm     { --title-color:#fbbf24; --badge-bg:rgba(251,191,36,0.12); --badge-color:#fbbf24; --badge-border:rgba(251,191,36,0.3); --hero-bg:radial-gradient(ellipse at 50% 0%,rgba(251,191,36,0.18) 0%,transparent 70%); }
    .g-regret  { --title-color:#fb923c; --badge-bg:rgba(251,146,60,0.12); --badge-color:#fb923c; --badge-border:rgba(251,146,60,0.3); --hero-bg:radial-gradient(ellipse at 50% 0%,rgba(251,146,60,0.18) 0%,transparent 70%); }
    .g-fail    { --title-color:#f87171; --badge-bg:rgba(248,113,113,0.12); --badge-color:#f87171; --badge-border:rgba(248,113,113,0.3); --hero-bg:radial-gradient(ellipse at 50% 0%,rgba(248,113,113,0.2) 0%,transparent 70%); }
    .g-erase   { --title-color:#c084fc; --badge-bg:rgba(192,132,252,0.12); --badge-color:#c084fc; --badge-border:rgba(192,132,252,0.3); --hero-bg:radial-gradient(ellipse at 50% 0%,rgba(192,132,252,0.2) 0%,transparent 70%); }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">

  <!-- INTRO -->
  <div id="screen-intro">
    <div class="intro-card">
      <div class="intro-card-top">
        <div class="intro">
          <div class="intro-icon-wrap">
            <span class="intro-icon">🌙</span>
          </div>
          <h1>오늘 내가 한 선택들,<br>후회할까?</h1>
          <p class="intro-desc">
            오늘 하루를 솔직하게 되돌아봐.<br>
            <strong>14가지 질문</strong>으로 오늘의 선택들을 판정해줄게.<br>
            솔직하게 답해야 정확해.
          </p>
          <div class="intro-tags">
            <span class="intro-tag">🌙 14문제</span>
            <span class="intro-tag">⏱ 1분</span>
            <span class="intro-tag">💯 익명</span>
          </div>
          <button class="start-btn" onclick="startQuiz()">판정 시작하기 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" style="display:none">
    <button class="back-btn" id="back-btn" onclick="goBack()">← 이전</button>
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-label">🌙 오늘의 선택 판정 중</span>
        <span class="progress-count" id="prog-count">1 / 14</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="card">
      <div class="question-card" id="qcard"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" style="display:none"></div>

</div>

<div class="toast" id="toast">🔗 링크 복사됐어!</div>

<script>
  // 별 생성
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--o:${(Math.random()*0.5+0.2).toFixed(2)};--delay:${(Math.random()*5).toFixed(1)}s`;
    starsEl.appendChild(s);
  }

  function launchConfetti() {
    const colors = ['#a78bfa','#c4b5fd','#7c3aed','#34d399','#818cf8','#e879f9'];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};--cd:${(Math.random()*1.5+1).toFixed(2)}s;--cdelay:${(Math.random()*0.8).toFixed(2)}s;width:${Math.random()*8+4}px;height:${Math.random()*8+4}px;border-radius:${Math.random()>0.5?'50%':'2px'};`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
  }

  const QUESTIONS = [
    { emoji:'🍔', text:'오늘 야식이나 배달 두 번 이상 시켰어?', options:[
      { icon:'🥗', text:'아니, 건강하게 먹었어', score:0 },
      { icon:'🍕', text:'한 번은 시켰어', score:0 },
      { icon:'🍔', text:'두 번 이상 시켰어...', score:1 },
    ]},
    { emoji:'💸', text:'오늘 예상보다 돈을 많이 썼어?', options:[
      { icon:'✅', text:'계획대로 썼어', score:0 },
      { icon:'😬', text:'조금 더 썼어...', score:1 },
    ]},
    { emoji:'📋', text:'오늘 해야 할 거 미뤘어?', options:[
      { icon:'💪', text:'다 처리했어!', score:0 },
      { icon:'🙈', text:'미뤘어... 내일의 나야 부탁해', score:1 },
    ]},
    { emoji:'💬', text:'오늘 했던 말 중에 취소하고 싶은 게 있어?', options:[
      { icon:'😇', text:'없어, 완벽했어', score:0 },
      { icon:'😣', text:'있어... 그 말 지우고 싶어', score:1 },
    ]},
    { emoji:'📱', text:'오늘 SNS나 유튜브 쇼츠를 3시간 이상 봤어?', options:[
      { icon:'👍', text:'아니, 절제했어', score:0 },
      { icon:'🫠', text:'응... 시간이 증발했어', score:1 },
    ]},
    { emoji:'😴', text:'오늘 잠이 부족해서 피곤했어?', options:[
      { icon:'😊', text:'충분히 잤어', score:0 },
      { icon:'🥱', text:'부족했어, 졸렸어', score:1 },
    ]},
    { emoji:'🫢', text:'오늘 하지 말았어야 할 행동이 있어?', options:[
      { icon:'😎', text:'딱히 없어', score:0 },
      { icon:'🤦', text:'있어... 아 진짜 왜 그랬지', score:1 },
    ]},
    { emoji:'🚪', text:'오늘 잡을 수 있었던 기회를 그냥 넘겼어?', options:[
      { icon:'🙌', text:'없어, 다 잡았어', score:0 },
      { icon:'😔', text:'있어... 그냥 넘겼어', score:1 },
    ]},
    { emoji:'🔥', text:'오늘 감정적으로 행동한 적 있어?', options:[
      { icon:'🧘', text:'이성적으로 잘 다스렸어', score:0 },
      { icon:'💥', text:'감정이 앞섰어...', score:1 },
    ]},
    { emoji:'⏰', text:'오늘 시간을 낭비한 것 같아?', options:[
      { icon:'⚡', text:'알차게 보냈어', score:0 },
      { icon:'🕳️', text:'시간이 그냥 사라진 것 같아', score:1 },
    ]},
    { emoji:'📞', text:'오늘 연락했으면 좋았을 사람이 있는데 안 했어?', options:[
      { icon:'💌', text:'없어, 잘 연락했어', score:0 },
      { icon:'😶', text:'있어, 근데 그냥 넘겼어', score:1 },
    ]},
    { emoji:'🛒', text:'오늘 충동적으로 돈 쓴 거 있어?', options:[
      { icon:'💰', text:'아니, 참았어', score:0 },
      { icon:'🛍️', text:'응... 어쩌다 보니 결제했어', score:1 },
    ]},
    { emoji:'🌃', text:'오늘 일찍 자려고 했는데 또 늦게 잘 것 같아?', options:[
      { icon:'🌙', text:'일찍 잘 거야!', score:0 },
      { icon:'🦉', text:'또 새벽이 될 것 같아...', score:1 },
    ]},
    { emoji:'🏃', text:'오늘 운동하려고 했는데 결국 안 했어?', options:[
      { icon:'💪', text:'했어! / 원래 계획 없었어', score:0 },
      { icon:'🛋️', text:'하려고 했는데 누웠어...', score:1 },
    ]},
  ];

  const GRADES = [
    { key:'g-perfect', emoji:'✨', badge:'완벽한 하루',
      title:'오늘의 나, 꽤 선방했는데?',
      sub:'스스로 한번 칭찬해줘도 될 것 같아. 오늘 하루 꽤 잘 버텼잖아.',
      advice:'이 상태를 내일도 유지해봐. 뭔가 좋은 루틴이 생기고 있는 것 같은데?' },
    { key:'g-hmm', emoji:'🤔', badge:'약간 찜찜함',
      title:'뭔가 살짝 찜찜하긴 해',
      sub:'큰 후회는 아니지만 마음 어딘가에 걸리는 게 있는 것 같아.',
      advice:'너무 자책하지는 마. 내일 그 찜찜한 것 하나만 해결해봐.' },
    { key:'g-regret', emoji:'😬', badge:'꽤 후회됨',
      title:'오늘... 솔직히 꽤 후회되긴 해',
      sub:'나쁜 하루는 아니었는데, 되돌리고 싶은 순간들이 좀 있었지.',
      advice:'후회를 느낀다는 건 더 나아지고 싶다는 거야. 내일 딱 한 가지만 바꿔봐.' },
    { key:'g-fail', emoji:'😭', badge:'오늘 좀 망했다',
      title:'오늘은... 좀 망한 것 같아',
      sub:'여러 가지가 꼬인 날이었나봐. 그래도 살았잖아. 내일은 다를 거야.',
      advice:'지금 이 순간 이미 반성 중이잖아. 그게 내일을 바꾸는 시작이야.' },
    { key:'g-erase', emoji:'🫥', badge:'기억 지우고 싶다',
      title:'이 하루는 기억에서 지우고 싶어',
      sub:'오늘 하루가 좀 많이 힘들었구나. 근데 그런 날도 있어. 진짜로.',
      advice:'자고 일어나면 진짜 새 하루야. 오늘의 너 수고했어.' },
  ];

  let cur = 0, answers = [];

  function startQuiz() {
    cur = 0; answers = [];
    document.getElementById('screen-intro').style.display = 'none';
    document.getElementById('screen-quiz').style.display = 'block';
    renderQ(0);
  }

  function renderQ(idx) {
    const q = QUESTIONS[idx];
    document.getElementById('prog-fill').style.width = (idx / QUESTIONS.length * 100) + '%';
    document.getElementById('prog-count').textContent = `${idx+1} / ${QUESTIONS.length}`;
    document.getElementById('back-btn').disabled = idx === 0;
    const card = document.getElementById('qcard');
    card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
    card.innerHTML = `
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-num">질문 ${idx+1}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o,i) => `
          <button class="option-btn" onclick="pick(${i},${o.score})">
            <span class="option-icon">${o.icon}</span>
            <span>${o.text}</span>
          </button>`).join('')}
      </div>`;
  }

  function pick(idx, score) {
    document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = 'none');
    document.querySelectorAll('.option-btn')[idx].classList.add('selected');
    answers[cur] = score;
    setTimeout(() => {
      cur++;
      if (cur < QUESTIONS.length) renderQ(cur);
      else showResult();
    }, 380);
  }

  function goBack() {
    if (cur === 0) return;
    answers.pop(); cur--;
    renderQ(cur);
  }

  function showResult() {
    document.getElementById('screen-quiz').style.display = 'none';
    const el = document.getElementById('screen-result');
    el.style.display = 'block';

    const total = answers.reduce((a,b) => a+b, 0);
    let gi = total <= 2 ? 0 : total <= 4 ? 1 : total <= 8 ? 2 : total <= 11 ? 3 : 4;
    const g = GRADES[gi];

    el.innerHTML = `
      <div class="result-outer ${g.key}">
        <div class="result-card">
          <div class="result-hero">
            <span class="result-emoji">${g.emoji}</span>
            <div class="result-badge">${g.badge}</div>
            <div class="result-title">${g.title}</div>
            <div class="result-sub">${g.sub}</div>
          </div>
          <div class="advice-section">
            <div class="advice-box">
              <div class="advice-tag">🌙 오늘 밤 한마디</div>
              <div class="advice-text">${g.advice}</div>
            </div>
            <div class="ad-wrap">
              <ins class="kakao_ad_area" style="display:none;"
                data-ad-unit="DAN-PVu656ucRpjzw2zW"
                data-ad-width="320" data-ad-height="50"></ins>
            </div>
            <div class="action-btns">
              <button class="primary-btn" onclick="retry()">🔄 다시 해보기</button>
              <button class="secondary-btn" onclick="shareResult()">🔗 결과 공유하기</button>
            </div>
          </div>
        </div>
      </div>`;

    if (gi === 0) launchConfetti();
  }

  function retry() {
    cur = 0; answers = [];
    document.getElementById('screen-result').style.display = 'none';
    document.getElementById('screen-intro').style.display = 'block';
  }

  function shareResult() {
    navigator.clipboard.writeText(location.href).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    });
  }
</script>
</body>
</html>
